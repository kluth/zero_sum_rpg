<!DOCTYPE html>

<html class="light" lang="de"><head>
<meta charset="utf-8"/>

<title>Zero Sum - Status Hub</title>

                        "headline": ["Plus Jakarta Sans", "sans-serif"],

                        "body": ["Plus Jakarta Sans", "sans-serif"],

                    }
                }

<style>
        body {
            background-color: #e8eaf0; /* matching 'surface' exactly to ensure neomorphic effect works */
        }
        .neo-raised {
            box-shadow: 6px 6px 12px rgba(0,0,0,0.08), -6px -6px 12px rgba(255,255,255,0.6);
        }
        .neo-inset {
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.06), inset -4px -4px 8px rgba(255,255,255,0.5);
        }
        .neo-button:active {
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.06), inset -4px -4px 8px rgba(255,255,255,0.5);
            transform: scale(0.98);
        }
        
        /* Circular Progress Animation */
        .progress-ring__circle {
            transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface flex justify-between items-center px-6 py-4 shadow-[6px_6px_12px_rgba(0,0,0,0.08),-6px_-6px_12px_rgba(255,255,255,0.6)] z-40 transition-all duration-200">
<button aria-label="Signal Strength" class="flex items-center justify-center w-10 h-10 rounded-full bg-surface neo-raised neo-button text-primary transition-all duration-200">
<span class="material-symbols-outlined text-xl">signal_cellular_alt</span>
</button>
<h1 class="text-lg font-headline font-semibold text-on-surface tracking-wider uppercase">SURVIVAL_OS_v1.0</h1>
<button aria-label="Data Limit" class="flex items-center justify-center px-4 py-2 rounded-full bg-surface neo-raised neo-button font-body font-semibold tracking-wider text-primary text-sm uppercase transition-all duration-200">
            150MB
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto px-6 py-8 pb-32 flex flex-col gap-10">
<!-- Signal & Network Status -->
<section class="flex justify-between items-center bg-surface p-4 rounded-xl neo-raised">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full neo-inset flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary animate-pulse shadow-[0_0_8px_rgba(99,102,241,0.6)]"></div>
</div>
<div class="flex flex-col">
<span class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider">Netzwerk</span>
<span class="font-headline text-sm font-semibold text-on-surface">Verschlüsselt</span>
</div>
</div>
<div class="flex items-end gap-1 h-6">
<div class="w-1.5 h-2 bg-primary rounded-t-sm"></div>
<div class="w-1.5 h-3 bg-primary rounded-t-sm"></div>
<div class="w-1.5 h-4 bg-primary rounded-t-sm"></div>
<div class="w-1.5 h-6 bg-primary rounded-t-sm"></div>
<div class="w-1.5 h-6 bg-surface-variant neo-inset rounded-t-sm"></div>
</div>
</section>
<!-- Main Data Dial (150MB) -->
<section class="flex flex-col items-center justify-center py-4">
<h2 class="font-label text-sm font-semibold text-on-surface-variant uppercase tracking-widest mb-6">Datenvolumen</h2>
<div class="relative w-64 h-64 rounded-full bg-surface neo-raised flex items-center justify-center p-6">
<!-- Inner Track -->
<div class="w-full h-full rounded-full bg-surface neo-inset flex items-center justify-center relative">
<!-- SVG Ring -->
<svg class="absolute inset-0 w-full h-full drop-shadow-md" viewbox="0 0 100 100">
<!-- Define gradient for stroke to simulate extruded light on the primary color -->
<defs>
<lineargradient id="primaryGradient" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" stop-color="#818cf8"></stop>
<stop offset="100%" stop-color="#4338ca"></stop>
</lineargradient>
</defs>
<!-- Inset track visually defined by parent div, just drawing the progress here -->
<circle class="progress-ring__circle" cx="50" cy="50" fill="transparent" r="44" stroke="url(#primaryGradient)" stroke-linecap="round" stroke-width="6" style="stroke-dasharray: 276.46; stroke-dashoffset: 60;"></circle>
</svg>
<!-- Text Center -->
<div class="flex flex-col items-center z-10">
<span class="text-5xl font-display font-bold text-primary tracking-tighter drop-shadow-sm">150</span>
<span class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-widest mt-1">MB Rest</span>
</div>
</div>
</div>
</section>
<!-- Group Status Cards -->
<section class="flex flex-col gap-5">
<h2 class="font-label text-sm font-semibold text-on-surface-variant uppercase tracking-widest pl-2">Gruppenstatus</h2>
<!-- Card: Paramedic -->
<article class="bg-surface p-5 rounded-2xl neo-raised flex flex-col gap-4">
<div class="flex justify-between items-center">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-xl neo-inset flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">medical_services</span>
</div>
<div class="flex flex-col">
<span class="font-headline text-sm font-semibold text-on-surface">Sanitäter</span>
<span class="font-label text-[10px] text-on-surface-variant uppercase">Standort: HQ</span>
</div>
</div>
<span class="font-label text-xs font-semibold text-primary">OK</span>
</div>
<!-- Status Bars -->
<div class="flex gap-4">
<div class="flex-1 flex flex-col gap-1">
<div class="flex justify-between font-label text-[10px] text-on-surface-variant uppercase">
<span>Gesundheit</span>
<span>95%</span>
</div>
<div class="h-2 w-full bg-surface neo-inset rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full shadow-[inset_0_-2px_4px_rgba(0,0,0,0.2)]" style="width: 95%"></div>
</div>
</div>
<div class="flex-1 flex flex-col gap-1">
<div class="flex justify-between font-label text-[10px] text-on-surface-variant uppercase">
<span>Stress</span>
<span>20%</span>
</div>
<div class="h-2 w-full bg-surface neo-inset rounded-full overflow-hidden">
<div class="h-full bg-tertiary rounded-full shadow-[inset_0_-2px_4px_rgba(0,0,0,0.2)]" style="width: 20%"></div>
</div>
</div>
</div>
</article>
<!-- Card: IT Tech -->
<article class="bg-surface p-5 rounded-2xl neo-raised flex flex-col gap-4">
<div class="flex justify-between items-center">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-xl neo-inset flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">terminal</span>
</div>
<div class="flex flex-col">
<span class="font-headline text-sm font-semibold text-on-surface">IT-Techniker</span>
<span class="font-label text-[10px] text-on-surface-variant uppercase">Standort: Feld</span>
</div>
</div>
<span class="font-label text-xs font-semibold text-secondary">WARTE</span>
</div>
<!-- Status Bars -->
<div class="flex gap-4">
<div class="flex-1 flex flex-col gap-1">
<div class="flex justify-between font-label text-[10px] text-on-surface-variant uppercase">
<span>Gesundheit</span>
<span>80%</span>
</div>
<div class="h-2 w-full bg-surface neo-inset rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full shadow-[inset_0_-2px_4px_rgba(0,0,0,0.2)]" style="width: 80%"></div>
</div>
</div>
<div class="flex-1 flex flex-col gap-1">
<div class="flex justify-between font-label text-[10px] text-on-surface-variant uppercase">
<span>Stress</span>
<span>65%</span>
</div>
<div class="h-2 w-full bg-surface neo-inset rounded-full overflow-hidden">
<div class="h-full bg-tertiary rounded-full shadow-[inset_0_-2px_4px_rgba(0,0,0,0.2)]" style="width: 65%"></div>
</div>
</div>
</div>
</article>
<!-- Card: Journalist -->
<article class="bg-surface p-5 rounded-2xl neo-raised flex flex-col gap-4">
<div class="flex justify-between items-center">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-xl neo-inset flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[20px]">mic</span>
</div>
<div class="flex flex-col">
<span class="font-headline text-sm font-semibold text-on-surface">Journalist</span>
<span class="font-label text-[10px] text-on-surface-variant uppercase">Standort: Unbekannt</span>
</div>
</div>
<span class="font-label text-xs font-semibold text-error">GEFAHR</span>
</div>
<!-- Status Bars -->
<div class="flex gap-4">
<div class="flex-1 flex flex-col gap-1">
<div class="flex justify-between font-label text-[10px] text-on-surface-variant uppercase">
<span>Gesundheit</span>
<span>45%</span>
</div>
<div class="h-2 w-full bg-surface neo-inset rounded-full overflow-hidden">
<div class="h-full bg-error rounded-full shadow-[inset_0_-2px_4px_rgba(0,0,0,0.2)]" style="width: 45%"></div>
</div>
</div>
<div class="flex-1 flex flex-col gap-1">
<div class="flex justify-between font-label text-[10px] text-on-surface-variant uppercase">
<span>Stress</span>
<span>90%</span>
</div>
<div class="h-2 w-full bg-surface neo-inset rounded-full overflow-hidden">
<div class="h-full bg-tertiary rounded-full shadow-[inset_0_-2px_4px_rgba(0,0,0,0.2)]" style="width: 90%"></div>
</div>
</div>
</div>
</article>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface flex justify-around items-center px-4 pb-6 pt-4 shadow-[0px_-6px_12px_rgba(0,0,0,0.08),0px_6px_12px_rgba(255,255,255,0.6)]">
<!-- DASH (Active) -->
<button class="flex flex-col items-center justify-center text-primary shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] rounded-xl w-16 h-16 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-label font-medium text-[10px] uppercase tracking-tighter">DASH</span>
</button>
<!-- GROUP (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant w-16 h-16 hover:text-primary transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined mb-1">group</span>
<span class="font-label font-medium text-[10px] uppercase tracking-tighter">GROUP</span>
</button>
<!-- INTEL (Inactive) -->
<button class="flex flex-col items-center justify-center text-on-surface-variant w-16 h-16 hover:text-primary transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined mb-1">database</span>

</button>
