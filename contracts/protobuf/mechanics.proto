syntax = "proto3";

package zero_sum.mechanics;

import "topology.proto";

message Coordinate3D {
  int32 x = 1;
  int32 y = 2;
  int32 z = 3;
}

message Velocity {
  double dx = 1;
  double dy = 2;
  double dz = 3;
}

message Mass {
  double kg = 1;
}

message CalculateTrajectoryRequest {
  Coordinate3D origin = 1;
  Velocity velocity = 2;
  Mass mass = 3;
}

message CalculateTrajectoryResponse {
  repeated Coordinate3D path = 1;
  Coordinate3D collision_point = 2;
}

message CalculateEncumbranceRequest {
  Mass total_weight = 1;
  int32 base_movement_range = 2;
  int32 injury_penalty = 3;
}

message CalculateEncumbranceResponse {
  int32 actual_movement_range = 1;
}

service MechanicsService {
  rpc CalculateTrajectory(CalculateTrajectoryRequest) returns (CalculateTrajectoryResponse);
  rpc CalculateEncumbrance(CalculateEncumbranceRequest) returns (CalculateEncumbranceResponse);
}
