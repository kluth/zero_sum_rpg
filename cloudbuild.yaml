steps:
  # 1. Test the Go Backend
  - name: 'golang:1.22'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd backend
        go mod download
        go test ./...

  # 2. Build the Backend Binary
  - name: 'golang:1.22'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd backend
        CGO_ENABLED=0 GOOS=linux go build -o zero_sum_api cmd/server/main.go

  # 3. Docker Containerization (Optional Next Step)
  # - name: 'gcr.io/cloud-builders/docker'
  #   args: ['build', '-t', 'gcr.io/$PROJECT_ID/zero-sum-api', './backend']

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
