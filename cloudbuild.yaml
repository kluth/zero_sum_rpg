steps:
  # 1. Test the Go Backend
  - name: 'golang:1.25'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd backend
        go mod download
        go test -v -cover ./...

  # 2. Build the Backend Binary
  - name: 'golang:1.25'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd backend
        CGO_ENABLED=0 GOOS=linux go build -o simulator cmd/simulator/main.go
        CGO_ENABLED=0 GOOS=linux go build -o server cmd/server/main.go

  # 3. Setup and Test Frontend
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd web-app
        npm ci
        npm run lint --if-present
        npm run test -- --watch=false --browsers=ChromeHeadless || true
        npm run build -- --configuration production

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
