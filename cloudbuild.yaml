steps:
  # 1. Test the Go Backend
  - name: 'golang:1.25'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd backend
        go mod download
        go test -v -cover ./...

  # 2. Build the Backend Binary
  - name: 'golang:1.25'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd backend
        CGO_ENABLED=0 GOOS=linux go build -o simulator cmd/simulator/main.go
        CGO_ENABLED=0 GOOS=linux go build -o server cmd/server/main.go

  # 3. Setup and Test Frontend
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd web-app
        npm ci
        npm run lint --if-present
        npm run test -- --watch=false --browsers=ChromeHeadless || true
        npm run build -- --configuration production

  # 4. Android Linting & Unit Tests
  - name: 'ghcr.io/cirruslabs/android-sdk:34'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd zero_sum_android
        ./gradlew lintRelease testReleaseUnitTest
        ./gradlew bundleRelease

  # 5. Automated AI Testing via Firebase Test Lab (Robo Test)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud firebase test android run \
          --type robo \
          --app zero_sum_android/app/build/outputs/bundle/release/app-release.aab \
          --device model=Pixel3,version=30,locale=en,orientation=portrait \
          --timeout 3m

  # 6. Deploy Android App to Google Play
  - name: 'ghcr.io/cirruslabs/android-sdk:34'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd zero_sum_android
        echo "$$ANDROID_KEYSTORE_B64" | base64 -d > app/upload-keystore.jks
        echo "$$PLAY_STORE_KEY" > /tmp/google-play-api-key.json
        apt-get update && apt-get install -y ruby-full build-essential
        gem install bundler
        gem install fastlane
        fastlane deploy
    secretEnv: ['PLAY_STORE_KEY', 'ANDROID_KEYSTORE_B64']
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/play_store_key/versions/latest
      env: 'PLAY_STORE_KEY'
    - versionName: projects/$PROJECT_ID/secrets/android_keystore_b64/versions/latest
      env: 'ANDROID_KEYSTORE_B64'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
