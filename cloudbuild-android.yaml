steps:
  # Deploy via Fastlane to Google Play Console
  # Assumes FASTLANE_JSON_KEY is provided via Cloud Build secrets
  - name: 'ruby:3.2'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd zero_sum_android
        echo "$$FASTLANE_JSON_KEY" > /tmp/google-play-api-key.json
        gem install bundler
        gem install fastlane
        fastlane deploy
    secretEnv: ['FASTLANE_JSON_KEY']

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/fastlane-play-console-json/versions/latest
    env: 'FASTLANE_JSON_KEY'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
