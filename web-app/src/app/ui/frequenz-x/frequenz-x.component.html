<div class="fx-app-container">
  <header class="fx-header">
    <div class="fx-branding">
      <div class="fx-logo">X</div>
      <h2>Frequenz X</h2>
    </div>
    <div class="status-badge">Live Feed</div>
  </header>
  
  <main class="fx-feed">
    <div *ngFor="let msg of messages" class="fx-post">
      <div class="fx-avatar">
        <img [src]="'https://ui-avatars.com/api/?name=User&background=random&color=fff&rounded=true'" alt="Avatar">
      </div>
      <div class="fx-post-content">
        <div class="fx-post-header">
          <span class="fx-username">AnonymousUser</span>
          <span class="fx-handle">&#64;anon_frequenz</span>
          <span class="fx-time">Just now</span>
        </div>
        <div class="fx-post-body">
          {{msg.content}}
        </div>
        <div class="fx-post-actions">
          <span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg> Reply</span>
          <span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg> Like</span>
          <span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg> Share</span>
        </div>
      </div>
    </div>
  </main>
</div>
