<div class="whispernet-container">
  <div class="message-feed">
    <div *ngFor="let msg of messages" class="msg received">
      <div class="msg-meta">
        <span class="sender">Ops Control</span>
        <span class="timestamp">{{msg.timestamp | date:'shortTime'}}</span>
      </div>
      <span class="text">{{msg.content}}</span>
    </div>
  </div>
  <div class="input-area">
    <span class="prompt">Type a message...</span>
    <div class="cursor-blink">|</div>
  </div>
</div>
