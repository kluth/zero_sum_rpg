steps:
  - name: 'ghcr.io/cirruslabs/android-sdk:34'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "$$PLAY_STORE_KEY" > /tmp/google-play-api-key.json
        apt-get update && apt-get install -y ruby-full build-essential
        gem install bundler
        gem install fastlane
        fastlane deploy
    secretEnv: ['PLAY_STORE_KEY']
options:
  machineType: 'E2_HIGHCPU_8'
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/play_store_key/versions/latest
      env: 'PLAY_STORE_KEY'
